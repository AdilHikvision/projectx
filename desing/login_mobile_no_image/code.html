<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Access Control - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#aa9ad4",
                        "background-light": "#f7f6f7",
                        "background-dark": "#17151d",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Sign In</h2>
</div>
<!-- Hero / Branding Section -->
<!-- Welcome Text -->
<div class="max-w-[480px] mx-auto w-full">
<h2 class="text-slate-900 dark:text-slate-100 tracking-tight text-[28px] font-bold leading-tight px-6 text-center pb-2 pt-6">Welcome to Secure Portal</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pb-6 px-6 text-center">Manage your access control devices and security settings</p>
</div>
<!-- Login Form -->
<div class="flex flex-col max-w-[480px] mx-auto w-full gap-4 px-6">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Email Address</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-primary/20 bg-white dark:bg-slate-800/50 h-14 placeholder:text-slate-400 p-[15px] text-base" placeholder="name@company.com" type="email" value=""/>
</label>
<label class="flex flex-col w-full">
<div class="flex justify-between items-center pb-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal">Password</p>
<a class="text-primary text-xs font-bold hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-primary/20 bg-white dark:bg-slate-800/50 h-14 placeholder:text-slate-400 p-[15px] text-base" placeholder="••••••••" type="password" value=""/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer">visibility</span>
</div>
</label>
<div class="flex items-center gap-2 py-2">
<input class="w-5 h-5 rounded border-primary/30 text-primary focus:ring-primary bg-white dark:bg-slate-800" id="mfa" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 font-medium" for="mfa">Use Multi-Factor Authentication (MFA)</label>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-2 flex items-center justify-center gap-2">
<span>Sign In</span>
<span class="material-symbols-outlined text-xl">login</span>
</button>
<!-- Secondary Options -->
<div class="flex flex-col items-center gap-6 mt-8">
<div class="flex items-center w-full gap-4">
<div class="h-[1px] bg-primary/20 flex-1"></div>
<span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Or continue with</span>
<div class="h-[1px] bg-primary/20 flex-1"></div>
</div>
<div class="flex gap-4 w-full">
<button class="flex-1 flex items-center justify-center gap-2 py-3 border border-primary/20 rounded-lg hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-2xl">fingerprint</span>
<span class="text-sm font-semibold">Biometrics</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 py-3 border border-primary/20 rounded-lg hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-2xl">key</span>
<span class="text-sm font-semibold">SSO</span>
</button>
</div>
</div>
</div>
<!-- Footer -->
<div class="mt-auto py-8 text-center px-6">
<p class="text-slate-400 text-xs">By signing in, you agree to our Terms of Service and Privacy Policy.</p>
<div class="flex justify-center gap-4 mt-4">
<span class="text-primary text-[10px] font-bold uppercase tracking-tighter">Powered by UniFi Architecture</span>
</div>
</div>
</div>
</body></html>
