# ─────────────────────────────────────────────────────────────────────────────
# ProjectX — nginx reverse proxy (Windows)
#
# Fronts the ProjectX backend (Kestrel, bound to loopback 127.0.0.1) and exposes
# the app on the LAN. nginx listens on every interface so the app is reachable by
# the server's LAN IP (e.g. http://192.0.0.200), while Kestrel stays private.
#
# Placeholders __LISTEN_PORT__ / __BACKEND_PORT__ are substituted by
# install-nginx.ps1 when this file is deployed to <nginx>\conf\nginx.conf.
# ─────────────────────────────────────────────────────────────────────────────

# Run in the foreground as a single supervised process. Required when nginx is
# managed by a service wrapper (nssm): without this, nginx (no console under a
# Windows service) tries to daemonize, the launched process exits immediately, and
# nssm throttles the service into a "Paused" state.
daemon off;

worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;

    # Face/photo uploads go through the proxy — allow large bodies.
    client_max_body_size 50m;

    # WebSocket upgrade handling (SignalR /hubs/devices).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Backend upstream — Kestrel on loopback only.
    upstream projectx_backend {
        server 127.0.0.1:__BACKEND_PORT__;
        keepalive 32;
    }

    server {
        listen      __LISTEN_PORT__;
        listen      [::]:__LISTEN_PORT__;
        server_name _;

        # Real-time hub (WebSockets / Server-Sent Events). Long-lived, unbuffered.
        location /hubs/ {
            proxy_pass            http://projectx_backend;
            proxy_http_version    1.1;
            proxy_set_header      Upgrade           $http_upgrade;
            proxy_set_header      Connection        $connection_upgrade;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            proxy_buffering       off;
            proxy_cache           off;
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
        }

        # API + SPA (everything else) → Kestrel, which serves wwwroot + SPA fallback.
        location / {
            proxy_pass            http://projectx_backend;
            proxy_http_version    1.1;
            proxy_set_header      Upgrade           $http_upgrade;
            proxy_set_header      Connection        $connection_upgrade;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            proxy_read_timeout    300s;
        }
    }
}
